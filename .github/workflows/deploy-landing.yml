name: Deploy Landing

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build landing
        run: pnpm --filter landing exec nuxi build
        env:
          NUXT_SMTP_PASS: ${{ secrets.SMTP_PASS }}

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Deploy via rsync
        env:
          SSHPASS: ${{ secrets.INFOMANIAK_SSH_PASSWORD }}
          SSH_HOST: ${{ secrets.INFOMANIAK_SSH_HOST }}
          SSH_USER: ${{ secrets.INFOMANIAK_SSH_USER }}
        run: |
          sshpass -e rsync -avz --delete \
            --exclude='.env' \
            -e "ssh -o StrictHostKeyChecking=no" \
            apps/landing/.output/ \
            "$SSH_USER@$SSH_HOST:sites/umbravpn.io/"

      - name: Restart server
        continue-on-error: true
        env:
          SSHPASS: ${{ secrets.INFOMANIAK_SSH_PASSWORD }}
          SSH_HOST: ${{ secrets.INFOMANIAK_SSH_HOST }}
          SSH_USER: ${{ secrets.INFOMANIAK_SSH_USER }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no \
            "$SSH_USER@$SSH_HOST" \
            "pkill -f 'node server/index.mjs' || true"
