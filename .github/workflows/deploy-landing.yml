name: Deploy Landing

on:
  push:
    branches: [main]
    paths:
      - 'apps/landing/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-landing.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build landing
        run: pnpm --filter landing exec nuxi build

      - name: Deploy via rsync
        run: |
          sudo apt-get install -y sshpass
          sshpass -p "$SSH_PASS" rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            apps/landing/.output/ \
            "$SSH_USER@$SSH_HOST:sites/umbravpn.io/"
        env:
          SSH_HOST: ${{ secrets.INFOMANIAK_SSH_HOST }}
          SSH_USER: ${{ secrets.INFOMANIAK_SSH_USER }}
          SSH_PASS: ${{ secrets.INFOMANIAK_SSH_PASSWORD }}
