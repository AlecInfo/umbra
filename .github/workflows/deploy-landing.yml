name: Deploy Landing

on:
  push:
    branches: [main]
    paths:
      - 'apps/landing/**'
      - '.github/workflows/deploy-landing.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build landing
        run: pnpm --filter landing exec nuxi build

      - name: Deploy via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 57-109168.ssh.hosting-ik.com
          username: ${{ secrets.INFOMANIAK_SSH_USER }}
          password: ${{ secrets.INFOMANIAK_SSH_PASSWORD }}
          source: apps/landing/.output/*
          target: sites/umbravpn.io/
          strip_components: 3

      - name: Restart Node.js
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 57-109168.ssh.hosting-ik.com
          username: ${{ secrets.INFOMANIAK_SSH_USER }}
          password: ${{ secrets.INFOMANIAK_SSH_PASSWORD }}
          script: |
            cd sites/umbravpn.io
            if command -v pm2 &> /dev/null; then
              pm2 restart all
            fi
